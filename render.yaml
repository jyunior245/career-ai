services:
  - type: web
    name: career-ai-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: GROQ_API_KEY
        sync: false

  - type: web
    name: career-ai-frontend
    env: python
    buildCommand: "pip install -r requirements-frontend.txt"
    startCommand: "python app.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: API_BASE_URL
        value: "https://career-ai-backend.onrender.com/api/v1"
