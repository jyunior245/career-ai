version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DEBUG=False
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app/backend
    networks:
      - career-ai-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - DEBUG=True
    command: python app.py
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend
      - ./app.py:/app/app.py
    networks:
      - career-ai-network

networks:
  career-ai-network:
    driver: bridge
